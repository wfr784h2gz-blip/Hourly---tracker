<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hourly Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0d1724;
      color: #fff;
      margin: 0;
      padding: 0;
    }

    .app {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }

    .header h1 {
      margin: 0;
      color: #8ab4f8;
    }

    .header p {
      margin: 0;
      font-size: 0.9rem;
      color: #b0c4de;
    }

    .section {
      margin-top: 20px;
      background: #16253b;
      padding: 15px;
      border-radius: 8px;
    }

    label {
      display: block;
      margin-bottom: 10px;
    }

    input, select {
      padding: 5px;
      border-radius: 4px;
      border: none;
      margin-left: 10px;
    }

    button {
      padding: 10px 20px;
      background-color: #2d8cf0;
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover {
      background-color: #1a73e8;
    }

    p {
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Hourly Tracker</h1>
      <p>ServiceNow Integration (developed by Hansel)</p>
    </div>
    <div class="section" id="time-tracker">
      <h2>Time Tracker</h2>
      <label>Start Time: <input type="time" id="startTime"></label>
      <label>End Time: <input type="time" id="endTime"></label>
    </div>
    <div class="section" id="callout-tracker">
      <h2>Call-Out Tracker</h2>
      <label>Type:
        <select id="callOutType">
          <option value="">None</option>
          <option value="weekday">Weekday</option>
          <option value="weekend">Weekend</option>
        </select>
      </label>
      <label>Date: <input type="date" id="callOutDate"></label>
    </div>
    <div class="section">
      <button id="calculateBtn">Calculate</button>
    </div>
    <div class="section" id="summary">
      <h2>Summary</h2>
      <p id="totalHours">Total Hours: 0h 0m</p>
      <p id="overtimeHours">Overtime: 0h 0m</p>
      <p id="callOutPayDisplay">Call-Out Pay: $0.00</p>
      <p id="totalPay">Total Pay: $0.00</p>
    </div>
  </div>

  <script>
    document.getElementById('calculateBtn').addEventListener('click', calculate);

    function calculate() {
      const startTime = document.getElementById('startTime').value;
      const endTime = document.getElementById('endTime').value;
      const callOutType = document.getElementById('callOutType').value;

      if (!startTime || !endTime) {
        alert('Please select start and end times.');
        return;
      }

      const [startHour, startMin] = startTime.split(':').map(Number);
      const [endHour, endMin] = endTime.split(':').map(Number);

      const now = new Date();
      const startDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), startHour, startMin);
      let endDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), endHour, endMin);

      if (endDate < startDate) {
        endDate.setDate(endDate.getDate() + 1);
      }

      const diffMs = endDate - startDate;
      const totalMinutes = Math.floor(diffMs / (1000 * 60));
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;

      const totalHoursDecimal = totalMinutes / 60;
      const overtimeHoursDecimal = totalHoursDecimal > 8 ? totalHoursDecimal - 8 : 0;
      const regularHoursDecimal = totalHoursDecimal > 8 ? 8 : totalHoursDecimal;

      let callOutPay = 0;
      if (callOutType === 'weekday') {
        callOutPay = 25;
      } else if (callOutType === 'weekend') {
        callOutPay = 50;
      }

      const regularPay = regularHoursDecimal * 32;
      const overtimePay = overtimeHoursDecimal * 48;
      const totalPay = regularPay + overtimePay + callOutPay;

      document.getElementById('totalHours').textContent = `Total Hours: ${hours}h ${minutes}m`;
      const overtimeH = Math.floor(overtimeHoursDecimal);
      const overtimeM = Math.round((overtimeHoursDecimal - overtimeH) * 60);
      document.getElementById('overtimeHours').textContent = `Overtime: ${overtimeH}h ${overtimeM}m`;
      document.getElementById('callOutPayDisplay').textContent = `Call-Out Pay: $${callOutPay.toFixed(2)}`;
      document.getElementById('totalPay').textContent = `Total Pay: $${totalPay.toFixed(2)}`;
    }
  </script>
</body>
</html>
