<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <!-- Add the web app manifest so the app can be installed on mobile devices -->
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <title>Time Tracker</title>
</head>
<body>
    <header>
        <h1>Time Tracker</h1>
    </header>
    <main>
        <!-- Form for adding a new time entry -->
        <section id="add-entry">
            <h2>Add Time Entry</h2>
            <form id="entry-form">
                <label>
                    Date:
                    <input type="date" id="date" required>
                </label>
                <label>
                    Start Time:
                    <input type="time" id="start-time" required>
                </label>
                <label>
                    End Time:
                    <input type="time" id="end-time" required>
                </label>
                <label>
                    Hourly Rate (USD):
                    <input type="number" id="hourly-rate" step="0.01" value="15" required>
                </label>
                <label>
                    Call‑Out Fee (USD):
                    <input type="number" id="call-fee" step="0.01" value="0">
                </label>
                <label>
                    Overtime Threshold (hours per shift):
                    <input type="number" id="overtime-threshold" step="0.25" value="8">
                </label>
                <button type="submit">Add Entry</button>
            </form>
        </section>

        <!-- Table showing all recorded entries for the current user -->
        <section id="entries">
            <h2>Your Entries</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Start</th>
                        <th>End</th>
                        <th>Hours</th>
                        <th>Hourly Rate</th>
                        <th>Call Fee</th>
                        <th>Pay</th>
                        <th>Delete</th>
                    </tr>
                </thead>
                <tbody id="entries-body">
                    <!-- Entries will be populated here by script.js -->
                </tbody>
            </table>
        </section>

        <!-- Summary for the selected week -->
        <section id="weekly-summary">
            <h2>Weekly Summary</h2>
            <div id="week-navigation">
                <button id="prev-week">Previous Week</button>
                <span id="week-label"></span>
                <button id="next-week">Next Week</button>
            </div>
            <div id="summary-details">
                <p>Total Hours: <span id="total-hours">0</span></p>
                <p>Total Pay: $<span id="total-pay">0.00</span></p>
            </div>
        </section>
    </main>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js"></script>
    <!-- Main application logic -->
    <script src="script.js"></script>
</body>
</html>
